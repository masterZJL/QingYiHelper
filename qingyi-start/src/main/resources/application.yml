server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: qingyi-helper

  # DataSource
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:qingyi_helper}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  # Elasticsearch
  elasticsearch:
    uris: ${ES_HOST:http://localhost:9200}

  # File Upload
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  # Jackson
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# MyBatis Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.qingyi.helper.**.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# RocketMQ
rocketmq:
  name-server: ${ROCKETMQ_NAMESRV:localhost:9876}
  producer:
    group: qingyi-producer-group
    send-message-timeout: 30000
    retry-times-when-send-failed: 3

# MinIO
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:qingyi-helper}

# Spring AI
spring.ai:
  openai:
    api-key: ${OPENAI_API_KEY:sk-xxx}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com}
    chat:
      options:
        model: ${CHAT_MODEL:gpt-3.5-turbo}
        temperature: 0.7
    embedding:
      options:
        model: ${EMBEDDING_MODEL:text-embedding-ada-002}

# QingYi Auth
qingyi:
  auth:
    access-token-expire: 7200
    refresh-token-expire: 604800
    jwt-secret: ${JWT_SECRET:qingyi-helper-default-jwt-secret-key-2024-change-in-production}

# Knife4j
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
knife4j:
  enable: true
  setting:
    language: zh_cn

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.qingyi.helper: debug
    org.springframework.ai: debug
